<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YTranscribe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 64px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    h1 span { color: #ff4444; }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 40px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 680px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.95rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #ff4444; }
    input[type="text"]::placeholder { color: #555; }

    label {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #666;
      font-size: 0.8rem;
      margin-top: 16px;
      margin-bottom: 6px;
    }

    #resetBtn {
      background: none;
      border: 1px solid #444;
      border-radius: 4px;
      color: #666;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 400;
      padding: 2px 8px;
    }

    #resetBtn:hover { border-color: #888; color: #aaa; background: none; }

    textarea {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #ccc;
      font-size: 0.88rem;
      line-height: 1.6;
      padding: 10px 14px;
      resize: vertical;
      width: 100%;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #ff4444; }

    button {
      background: #ff4444;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 10px 20px;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    button:hover { background: #e03333; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      font-size: 0.85rem;
      margin-top: 14px;
      min-height: 20px;
    }

    .status.success { color: #4caf50; }
    .status.error   { color: #ff5555; }
    .status.loading { color: #888; }

    .transcript {
      width: 100%;
      max-width: 680px;
      margin-top: 28px;
      color: #bbb;
      font-size: 0.9rem;
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }
  </style>
</head>
<body>
  <h1><span>YT</span>ranscribe</h1>
  <p class="subtitle">輸入 YouTube 網址，自動抓取字幕並複製到剪貼簿</p>

  <div class="card">
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." />
      <button id="fetchBtn" onclick="process()">開始處理</button>
    </div>
    <label for="promptInput">前置提示詞（會加在字幕前面一起複製）<button type="button" id="resetBtn" onclick="resetPrompt()">恢復預設</button></label>
    <textarea id="promptInput"></textarea>
    <div class="status" id="status"></div>
  </div>

  <div class="transcript" id="transcript"></div>

  <script>
    const urlInput = document.getElementById('urlInput');
    const promptInput = document.getElementById('promptInput');
    const fetchBtn = document.getElementById('fetchBtn');
    const statusEl = document.getElementById('status');
    const transcriptEl = document.getElementById('transcript');

    const DEFAULT_PROMPT = '請幫我整理以下附有時間標記的 YouTube 字幕，排除聊天、討讚、廣告、無意義的字句，保留細節不要彙總，轉換成好讀的文章，並適當標記重要內容的對應時間（格式：[MM:SS]）';
    promptInput.value = localStorage.getItem('ytranscribe_prompt') ?? DEFAULT_PROMPT;
    promptInput.addEventListener('input', () => {
      localStorage.setItem('ytranscribe_prompt', promptInput.value);
    });

    function resetPrompt() {
      promptInput.value = DEFAULT_PROMPT;
      localStorage.setItem('ytranscribe_prompt', DEFAULT_PROMPT);
    }

    urlInput.addEventListener('focus', () => { urlInput.value = ''; });
    urlInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') process();
    });

    function translateError(msg) {
      if (msg === 'VIDEO_NOT_FOUND')
        return '找不到這部影片，網址可能有誤或影片已被刪除';
      if (/transcript is disabled/i.test(msg))
        return '這部影片未提供字幕（作者已關閉或從未上傳字幕）';
      if (/could not get transcript/i.test(msg))
        return '無法取得字幕，請確認網址正確且影片為公開狀態';
      if (/no transcript/i.test(msg))
        return '這部影片沒有可用的字幕';
      if (/video unavailable/i.test(msg))
        return '影片無法存取（可能為私人或已下架）';
      if (/invalid video id/i.test(msg))
        return '無法解析影片 ID，請確認網址格式';
      return msg;
    }

    async function copyToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const el = document.createElement('textarea');
      el.value = text;
      el.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
      document.body.appendChild(el);
      el.focus();
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
    }

    async function process() {
      const url = urlInput.value.trim();
      if (!url) return;

      fetchBtn.disabled = true;
      statusEl.className = 'status loading';
      statusEl.textContent = '處理中...';
      transcriptEl.style.display = 'none';
      transcriptEl.textContent = '';

      try {
        const res = await fetch('/transcript?url=' + encodeURIComponent(url));
        const data = await res.json();

        if (!res.ok) throw new Error(data.error);

        const prompt = promptInput.value.trim();
        const clipboardText = prompt ? prompt + '\n\n' + data.text : data.text;

        await copyToClipboard(clipboardText);

        transcriptEl.textContent = data.text;
        transcriptEl.style.display = 'block';

        statusEl.className = 'status success';
        statusEl.textContent = '已複製至剪貼簿，您可以貼上 AI 對話框';
      } catch (err) {
        statusEl.className = 'status error';
        statusEl.textContent = '錯誤：' + translateError(err.message);
      } finally {
        fetchBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
